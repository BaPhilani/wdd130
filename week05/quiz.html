<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>HTML & CSS Quiz</title>
    <rel link="stylesheet" href="styles/quiz.css"></rel>
</head>

<body>
    <h1>HTML and CSS Knowledge Quiz</h1>

    <form action="#" method="post">
        <fieldset>
            <legend>Quiz Questions</legend>

            <p>
                <label for="q1">1) What does HTML stand for?</label><br />
                <input type="text" id="q1" name="q1" placeholder="Type your answer" required />
            </p>

            <p>
                <label for="q2">2) In your own words, what is the purpose of CSS?</label><br />
                <textarea id="q2" name="q2" rows="4" cols="40" required></textarea>
            </p>

            <p>
                <label for="q3">3) Which CSS property changes text color?</label><br />
                <select id="q3" name="q3" required>
                    <option value="">--Choose one--</option>
                    <option value="color">color</option>
                    <option value="font-size">font-size</option>
                    <option value="margin">margin</option>
                </select>
            </p>

            <p>
                <label for="q4">4) How many heading levels does HTML provide (h1 to
                    h6)?</label><br />
                <input type="number" id="q4" name="q4" min="1" step="1" required />
            </p>

            <p>
                <button type="submit">Submit Quiz</button>
                <button type="reset">Reset</button>
            </p>
        </fieldset>
    </form>
</body>

</html>
