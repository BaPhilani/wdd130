<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Poll Form</title>
    <link rel="stylesheet" href="poll-form.css">
</head>

<body>
    <header>
        <h1>Poll Form</h1>
    </header>

    <main>
        <form action="#" method="post">
            <fieldset>
                <legend>Quick Poll</legend>

                <label for="fullname">Full Name:</label>
                <input type="text" id="fullname" name="fullname" required>

                <br><br>

                <label for="useremail">Email Address:</label>
                <input type="email" id="useremail" name="useremail" required>

                <br><br>

                <label for="browser">What is your favorite browser?</label>
                <select id="browser" name="browser" required>
                    <option value="">Select one</option>
                    <option value="chrome">Chrome</option>
                    <option value="safari">Safari</option>
                    <option value="edge">Edge</option>
                    <option value="brave">Brave</option>
                    <option value="other">Other</option>
                </select>

                <br><br>

                <label for="pet">Do you have a household pet?</label>
                <input type="checkbox" id="pet" name="pet">

                <br><br>

                <label for="feedback">List the places you have lived.</label>
                <textarea id="feedback" name="feedback" rows="4"
                  placeholder="Enter cities/towns you have lived in"></textarea>

                <br><br>

                <button type="submit">Submit Poll</button>
            </fieldset>
        </form>
    </main>

    <footer>
        <p>&copy; 2024. All rights reserved.</p>
    </footer>
</body>

</html>
