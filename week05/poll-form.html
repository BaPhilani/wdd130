<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Poll Form</title>
    <link rel="stylesheet" href="styles/poll-form.css">
</head>

<body>
    <header>
        <h1>Poll Form</h1>
    </header>

    <main>
        <form action="#" method="post">
            <fieldset>
                <legend>Quick Poll</legend>

                <div class="form-item column2">
                    <label for="fullname">Full Name:</label>
                    <input type="text" id="fullname" name="fullname" required>
                </div>

                <div class="form-item column2">
                    <label for="useremail">Email Address:</label>
                    <input type="email" id="useremail" name="useremail" required>
                </div>

                <div class="form-item column1">
                    <label for="browser">What is your favorite browser?</label>
                    <select id="browser" name="browser" required>
                        <option value="">Select one</option>
                        <option value="chrome">Chrome</option>
                        <option value="safari">Safari</option>
                        <option value="edge">Edge</option>
                        <option value="brave">Brave</option>
                        <option value="other">Other</option>
                    </select>
                </div>

                <div class="form-item column1">
                    <label for="pet">Do you have a household pet?</label>
                    <input type="checkbox" id="pet" name="pet">
                </div>

                <div class="form-item column1">
                    <label for="places">Places you have lived:</label>
                    <select id="places" name="places">
                        <option value="">Select a city</option>
                        <option value="harare">Harare</option>
                        <option value="mutare">Mutare</option>
                        <option value="bulawayo">Bulawayo</option>
                        <option value="gweru">Gweru</option>
                        <option value="masvingo">Masvingo</option>
                    </select>
                </div>

                <button type="submit">Submit Poll</button>
            </fieldset>
        </form>
    </main>

    <footer>
        <p>&copy; 2024. All rights reserved.</p>
    </footer>
</body>

</html>
