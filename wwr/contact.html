<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Us | White Water Rafting</title>
    <meta name="description"
      content="Contact White Water Rafting for trip questions, reservation support, and service information. Find our address, phone, email, map, and contact form.">
    <meta name="author" content="Victor Mtisi">
    <link rel="stylesheet" href="styles/rafting.css">
</head>

<body>
    <header>
        <img src="images/wwr-logo.png" alt="White Water Rafting Logo" width="120">
        <nav>
            <a href="index.html">Home</a>
            <a href="about.html">About Us</a>
            <a href="trips.html">Trips</a>
            <a href="contact.html">Contact Us</a>
        </nav>
    </header>

    <main>
        <section class="contact-intro">
            <h1>White Water Rafting Company</h1>
            <address>
                15968 Damafalls Phase 5<br>
                Ruwa, Zimbabwe<br>
                <a href="tel:+263772886931">+263 772 886 931</a><br>
                <a href="mailto:info@whitewaterrafting.com">info@whitewaterrafting.com</a>
            </address>
        </section>

        <section class="contact-grid">
            <div class="map-container">
                <iframe src="https://www.google.com/maps?q=Ruwa%2C%20Zimbabwe&output=embed"
                  title="Map showing White Water Rafting location in Ruwa, Zimbabwe" height="300"
                  loading="lazy" allowfullscreen referrerpolicy="no-referrer-when-downgrade">
                </iframe>
            </div>

            <div class="contact-form">
                <form action="#" method="post">
                    <p>
                        <label for="name">Name</label><br>
                        <input type="text" id="name" name="name" required>
                    </p>

                    <p>
                        <label for="email">Email</label><br>
                        <input type="email" id="email" name="email" required>
                    </p>

                    <fieldset>
                        <legend>Message Purpose</legend>
                        <p>
                            <input type="radio" id="purpose-general" name="purpose"
                              value="general-inquiry" required>
                            <label for="purpose-general">General Inquiry</label>
                        </p>
                        <p>
                            <input type="radio" id="purpose-reservation" name="purpose"
                              value="reservation-question">
                            <label for="purpose-reservation">Reservation Question</label>
                        </p>
                        <p>
                            <input type="radio" id="purpose-suggestion" name="purpose"
                              value="website-suggestion">
                            <label for="purpose-suggestion">Website Suggestion</label>
                        </p>
                    </fieldset>

                    <p>
                        <label for="message">Message</label><br>
                        <textarea id="message" name="message" rows="4" required></textarea>
                    </p>

                    <p>
                        <input type="checkbox" id="subscribe" name="subscribe" value="yes">
                        <label for="subscribe">Please subscribe me to the monthly newsletter</label>
                    </p>

                    <p>
                        <button type="submit" class="submit-button">Send Your Message</button>
                    </p>
                </form>
            </div>
        </section>

        <section class="employee-profiles">
            <h2>We Are Here to Serve You</h2>
            <div class="profile-cards">
                <figure>
                    <img src="images/operations.png"
                      alt="Portrait of Victor Mtisi, Operations Manager" width="120" height="120">
                    <figcaption><strong>Victor Mtisi</strong> — Operations Manager</figcaption>
                </figure>
                <figure>
                    <img src="images/reservations.png"
                      alt="Portrait of Patience Dzinesa, Reservations Lead" width="120"
                      height="120">
                    <figcaption><strong>Patience Dzinesa</strong> — Reservations Lead</figcaption>
                </figure>
                <figure>
                    <img src="images/marketing-lead.png"
                      alt="Portrait of Pilani Ndodhayawo, Digital Marketing Lead" width="120"
                      height="120">
                    <figcaption><strong>Pilani Ndodhayawo</strong> — Digital Marketing Lead
                    </figcaption>
                </figure>
            </div>
        </section>
    </main>

    <footer>
        <p>&copy; 2026 White Water Rafting | Victor Mtisi</p>
        <nav class="socialmedia">
            <a href="https://facebook.com" target="_blank" rel="noopener" aria-label="Facebook">
                <img src="images/facebook.svg" alt="Facebook icon" width="32">
            </a>
            <a href="https://instagram.com" target="_blank" rel="noopener" aria-label="Instagram">
                <img src="images/instagram.svg" alt="Instagram icon" width="32">
            </a>
            <a href="https://x.com" target="_blank" rel="noopener" aria-label="X">
                <img src="images/twitter-x.svg" alt="X social icon" width="32">
            </a>
        </nav>
    </footer>
</body>

</html>
