<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Us | White Water Rafting</title>
    <meta name="description"
      content="Contact White Water Rafting for trip questions, reservations, and service information. Find our address, phone, email, map, and message form.">
    <meta name="author" content="Victor Mtisi">
    <link rel="stylesheet" href="styles/rafting.css">
</head>

<body>
    <header>
        <img src="images/wwr-logo.png" alt="White Water Rafting Logo" width="120">
        <nav>
            <a href="index.html">Home</a>
            <a href="about.html">About Us</a>
            <a href="trips.html">Trips</a>
            <a href="contact.html">Contact Us</a>
        </nav>
    </header>

    <main>
        <section class="contact-intro">
            <h1>White Water Rafting Company</h1>
            <p><strong>15968 Damafalls Phase 5</strong></p>
            <p><strong>Ruwa, Zimbabwe</strong></p>
            <p><strong>+263 772 886 931</strong></p>
            <p><strong>info@whitewaterrafting.com</strong></p>
        </section>

        <section class="contact-grid">
            <div class="map-container">
                <iframe src="https://www.google.com/maps?q=Ruwa%2C%20Zimbabwe&output=embed"
                  width="100%" height="280" style="border:0;" allowfullscreen="" loading="lazy"
                  referrerpolicy="no-referrer-when-downgrade"
                  title="White Water Rafting location map">
                </iframe>
            </div>
            <div class="contact-form">
                <form action="#" method="post">
                    <p>
                        <label for="name">Name</label><br>
                        <input type="text" id="name" name="name" placeholder="Enter your name"
                          required>
                    </p>

                    <p>
                        <label for="email">Email</label><br>
                        <input type="email" id="email" name="email"
                          placeholder="Enter your email address" required>
                    </p>

                    <fieldset>
                        <legend>Message Purpose</legend>
                        <label>
                            <input type="radio" name="purpose" value="general-inquiry" required>
                            General Inquiry
                        </label><br>
                        <label>
                            <input type="radio" name="purpose" value="reservation-question">
                            Reservation Question
                        </label><br>
                        <label>
                            <input type="radio" name="purpose" value="website-suggestion">
                            Website Suggestion
                        </label>
                    </fieldset>

                    <p>
                        <label for="message">Message</label><br>
                        <textarea id="message" name="message" rows="4"
                          placeholder="Type your message here" required></textarea>
                    </p>

                    <p>
                        <label>
                            <input type="checkbox" name="subscribe" value="yes">
                            Please subscribe me to the monthly newsletter
                        </label>
                    </p>

                    <p>
                        <button type="submit" class="submit-button">Send Your Message</button>
                    </p>
                </form>
            </div>
        </section>

        <section class="employee-profiles">
            <h2>We Are Here to Serve You</h2>
            <div class="profile-cards">
                <figure>
                    <img src="images/operations.png"
                      alt="Portrait of Victor Mtisi, Operations Manager" width="120">
                    <figcaption><strong>Victor Mtisi</strong> — Operations Manager</figcaption>
                </figure>
                <figure>
                    <img src="images/reservations.png"
                      alt="Portrait of Patience Dzinesa, Reservations Lead" width="120">
                    <figcaption><strong>Patience Dzinesa</strong> — Reservations Lead</figcaption>
                </figure>
                <figure>
                    <img src="images/marketing lead.png"
                      alt="Portrait of Pilani Ndodhayawo, Digital Marketing Lead" width="120">
                    <figcaption><strong>Pilani Ndodhayawo</strong> — Digital Marketing Lead
                    </figcaption>
                </figure>
            </div>
        </section>
        </section>
    </main>

    <footer>
        <p>&copy; 2026 White Water Rafting | Victor Mtisi</p>
        <nav class="socialmedia">
            <a href="https://facebook.com" target="_blank" rel="noopener" aria-label="Facebook">
                <img src="images/facebook.svg" alt="Facebook icon" width="32">
            </a>
            <a href="https://instagram.com" target="_blank" rel="noopener" aria-label="Instagram">
                <img src="images/instagram.svg" alt="Instagram icon" width="32">
            </a>
            <a href="https://x.com" target="_blank" rel="noopener" aria-label="X">
                <img src="images/twitter-x.svg" alt="X social icon" width="32">
            </a>
        </nav>
    </footer>
</body>

</html>
